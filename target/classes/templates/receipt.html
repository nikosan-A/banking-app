<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transaction Receipt</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <h2>Transaction Receipt</h2>

    <p><strong>User:</strong> <span th:text="${user.username}"></span></p>
    <p><strong>Transaction Type:</strong> <span th:text="${transaction.type}"></span></p>
    <p><strong>Amount:</strong> <span th:text="${transaction.amount}"></span></p>
    <p><strong>Date:</strong> <span th:text="${transaction.timestamp}"></span></p>
    <p><strong>Remaining Balance:</strong> <span th:text="${user.balance}"></span></p>

    <hr/>
    <p>Thank you for using our banking app!</p>

    <p><a th:href="@{/dashboard}">Back to Dashboard</a></p>
</body>
</html>
